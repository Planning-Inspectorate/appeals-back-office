variables:
  - group: e2e-dev

trigger:
  branches:
    include:
      # trigger for merge queue branches
      - gh-readonly-queue/*

pr:
  branches:
    include:
      - '*'
  paths:
    exclude:
      - infrastructure

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: refs/tags/release/3.24.2

extends:
  template: stages/wrapper_ci.yml@templates
  parameters:
    gitFetchDepth: 0
    globalVariables:
      - template: azure-pipelines-variables.yml@self
    validationJobs:
      - name: Run Linting & Tests
        variables:
        - name: test-script
          ${{ if startsWith(variables['Build.SourceBranch'], 'refs/heads/gh-readonly-queue') }}:
            value: npm run test
          ${{ else }}:
            value: npm run test:cov
        steps:
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm ci
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run commitlint
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run tscheck
              environmentVariables:
                TURBO_TEAM: $(TURBO_TEAM)
                TURBO_API: $(TURBO_API)
                TURBO_TOKEN: $(TURBO_TOKEN)
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run lint:js
          - template: ../steps/node_script.yml
            parameters:
                nodeVersion: 22
                script: npm run format-check
          - template: ../steps/node_script.yml
            parameters:
              script: $(test-script)
              nodeVersion: 22
              environmentVariables:
                TURBO_TEAM: $(TURBO_TEAM)
                TURBO_API: $(TURBO_API)
                TURBO_TOKEN: $(TURBO_TOKEN)
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run build:release
              environmentVariables:
                TURBO_TEAM: $(TURBO_TEAM)
                TURBO_API: $(TURBO_API)
                TURBO_TOKEN: $(TURBO_TOKEN)
      - name: Run cypress e2e tests
        dependantOn: Check PR labels
        condition: eq(variables['Build.Reason'], 'PullRequest')
        steps:
          - script: |
              PR_NUMBER=$(echo "$(Build.SourceBranch)" | sed -n 's#refs/pull/\([0-9]\+\)/.*#\1#p')
              echo "PR_NUMBER: $PR_NUMBER"
              curl -s https://api.github.com/repos/Planning-Inspectorate/appeals-back-office/issues/$PR_NUMBER/labels > pr.json
            displayName: "Fetch PR metadata"
          - script: |
              if grep -q "bug" pr.json; then
                echo "Found 'bug' label in PR"
                echo "##vso[task.setvariable variable=runE2E]true"
              else
                echo "No 'bug' label found"
              fi
            displayName: "Check for label"
          - template: ../steps/azure_get_secrets.yml
            parameters:
              keyVaultName: pins-kv-appeals-bo-dev
              secrets:
                - name: appeals-bo-client-secret
                  variable: appeals-bo-client-secret
          - script:
              docker network create localNetwork
            condition: eq(variables['runE2E'], 'true')
            displayName: "Create Local Docker Network"
          - script:
              docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=SqlServer01" -p 1433:1433 --name pins-sql-server -d --network localNetwork mcr.microsoft.com/mssql/server:2022-latest
            condition: eq(variables['runE2E'], 'true')
            displayName: "Start Database"
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm ci
              condition: eq(variables['runE2E'], 'true')
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm --prefix ./appeals/api run db:migrate
              environmentVariables:
                NODE_ENV: test
                DATABASE_URL: "sqlserver://127.0.0.1:1433;database=pins_development;user=sa;password=SqlServer01;trustServerCertificate=true"
              condition: eq(variables['runE2E'], 'true')
          - script: |
              docker build . -f appeals/api/Dockerfile -t pins/api:local --build-arg GIT_SHA=$(Build.SourceVersion)
              docker run -p 3000:3000 -e "NODE_ENV=test" -e "DATABASE_URL=sqlserver://pins-sql-server:1433;database=pins_development;user=sa;password=SqlServer01;trustServerCertificate=true" --name api -d --network localNetwork pins/api:local
            condition: eq(variables['runE2E'], 'true')
            displayName: "Build and Run App"
          - script: |
              docker build . -f appeals/web/Dockerfile -t pins/web:local --build-arg GIT_SHA=$(Build.SourceVersion)
              docker run -p 8080:8080 -e "NODE_ENV=test" -e "AUTH_CLIENT_SECRET=$(appeals-bo-client-secret)" -e "AUTH_CLIENT_ID=64c20f53-becf-4b7e-ba62-c1dc9b03ccf9" -e "AUTH_DISABLED=false" -e "SESSION_SECRET=dummy-secret" --name web -d --network localNetwork pins/web:local
            condition: eq(variables['runE2E'], 'true')
            displayName: "Build and Run Web"
          - script: docker ps
            condition: eq(variables['runE2E'], 'true')
            displayName: "Check all containers are up"
          - script: curl -v http://localhost:3000/health
            condition: eq(variables['runE2E'], 'true')
          - script: curl -v http://localhost:8080/health
            condition: eq(variables['runE2E'], 'true')
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: |
                cd appeals/e2e
                npm install
              condition: eq(variables['runE2E'], 'true')
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: |
                cd appeals/e2e
                npm run cy:run-smoke
              environmentVariables:
                BASE_URL: http://localhost:8080/
                API_BASE_URL: http://localhost:3000/
                CASE_TEAM_EMAIL: $(CASE_TEAM_APPEALS_EMAIL)
                CASE_ADMIN_EMAIL: $(CASE_ADMIN_APPEALS_EMAIL)
                INSPECTOR_EMAIL: $(INSPECTOR_APPEALS_EMAIL)
                VALIDATION_OFFICER_EMAIL: $(VALIDATION_OFFICER_EMAIL)
                USER_PASSWORD: $(USER_PASSWORD)
                HAPPY_PATH_EMAIL: $(HAPPY_PATH_EMAIL)
                APP: appeals
              condition: eq(variables['runE2E'], 'true')
          - script: docker logs api
            condition: eq(variables['runE2E'], 'true')
          - script: docker logs web
            condition: eq(variables['runE2E'], 'true')
