trigger:
  branches:
    include:
      # trigger for merge queue branches
      - gh-readonly-queue/*

pr:
  branches:
    include:
      - '*'
  paths:
    exclude:
      - infrastructure

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: refs/tags/release/3.24.2

extends:
  template: stages/wrapper_ci.yml@templates
  parameters:
    gitFetchDepth: 0
    globalVariables:
      - template: azure-pipelines-variables.yml@self
    validationJobs:
      - name: Run Linting & Tests
        variables:
        - name: test-script
          ${{ if startsWith(variables['Build.SourceBranch'], 'refs/heads/gh-readonly-queue') }}:
            value: npm run test
          ${{ else }}:
            value: npm run test:cov
        steps:
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm ci
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run commitlint
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run tscheck
              environmentVariables:
                TURBO_TEAM: $(TURBO_TEAM)
                TURBO_API: $(TURBO_API)
                TURBO_TOKEN: $(TURBO_TOKEN)
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run lint:js
          - template: ../steps/node_script.yml
            parameters:
                nodeVersion: 22
                script: npm run format-check
          - template: ../steps/node_script.yml
            parameters:
              script: $(test-script)
              nodeVersion: 22
              environmentVariables:
                TURBO_TEAM: $(TURBO_TEAM)
                TURBO_API: $(TURBO_API)
                TURBO_TOKEN: $(TURBO_TOKEN)
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run build:release
              environmentVariables:
                TURBO_TEAM: $(TURBO_TEAM)
                TURBO_API: $(TURBO_API)
                TURBO_TOKEN: $(TURBO_TOKEN)
      - name: Run cypress e2e tests
        dependantOn: Check PR labels
        condition: eq(variables['Build.Reason'], 'PullRequest')
        steps:
          - task: ShellScript@2
            inputs:
              scriptPath: 'appeals/e2e/install-chromium.sh'
            displayName: 'Install Chromium'
            condition: eq(variables['agent.os'], 'Linux')
          - task: DockerInstaller@0
            inputs:
              dockerVersion: '17.09.0-ce'
          - script:
              docker network create localNetwork
            displayName: "Create Local Docker Network"
          - script:
              docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=SqlServer01" -p 1433:1433 --name pins-sql-server -d --network localNetwork mcr.microsoft.com/mssql/server:2022-latest
            displayName: "Start Database"
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm ci
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm --prefix ./appeals/api run db:migrate
              environmentVariables:
                NODE_ENV: test
                DATABASE_URL: "sqlserver://127.0.0.1:1433;database=pins_development;user=sa;password=SqlServer01;trustServerCertificate=true"
          - script: |
              docker build . -f appeals/api/Dockerfile -t pins/api:local --build-arg APP_ENV=test --build-arg GIT_SHA=$(Build.SourceVersion)
              docker run -p 3000:3000 -e "DATABASE_URL=sqlserver://pins-sql-server:1433;database=pins_development;user=sa;password=SqlServer01;trustServerCertificate=true" --name api -d --network localNetwork pins/api:local
            displayName: "Build and Run App"
          - script: |
              docker build . -f appeals/web/Dockerfile -t pins/web:local --build-arg GIT_SHA=$(Build.SourceVersion)
              docker run -p 8080:8080 -e "NODE_ENV=test" -d --network localNetwork pins/web:local
            displayName: "Build and Run Web"
          - script: docker ps
            displayName: "Check all containers are up"
          - script: curl -v http://localhost:3000/health
          - script: curl -v http://localhost:8080/health
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: |
                cd appeals/e2e
                npm install
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: |
                cd appeals/e2e
                npx cypress run --spec "cypress/e2e/back-office-appeals/**/*.spec.js"
              environmentVariables:
                BASE_URL: http://localhost:8080/
                API_BASE_URL: http://localhost:3000/
                VALIDATION_OFFICER_EMAIL: validationofficer.test@planninginspectorate.gov.uk
                CASE_ADMIN_EMAIL: caseteamofficer.test@planninginspectorate.gov.uk
                INSPECTOR_EMAIL: inspectorappeals.test@planninginspectorate.gov.uk
                APP: appeals
