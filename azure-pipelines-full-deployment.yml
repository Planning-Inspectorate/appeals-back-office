# Full deployment wrapper (currently logging-only) that calls the shared
# Confluence logging template.

trigger: none
pr: none

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Dev
    values:
      - Dev
      - Test
      - Staging
      - Training
      - Prod

  - name: terraformPlan
    displayName: Terraform Plan
    type: boolean
    default: true
  - name: terraformApply
    displayName: Terraform Apply
    type: boolean
    default: false

  - name: deployAppealsApi
    displayName: Deploy Appeals API
    type: boolean
    default: true
  - name: deployAppealsWeb
    displayName: Deploy Appeals Web
    type: boolean
    default: true
  - name: deployAppealsPdf
    displayName: Deploy Appeals PDF
    type: boolean
    default: true
  - name: deployFunctions
    displayName: Deploy all four functions
    type: boolean
    default: true
  - name: runDbMigration
    displayName: Run DB migration
    type: boolean
    default: false
  - name: deployToSlot
    displayName: Deploy to slot
    type: boolean
    default: false

  - name: seedData
    displayName: Seed data
    type: boolean
    default: false
  - name: purgeAndRecreate
    displayName: Purge and recreate
    type: boolean
    default: false

variables:
  - ${{ if eq(parameters.environment, 'Dev') }}:
      - group: cd_dev
  - ${{ if eq(parameters.environment, 'Test') }}:
      - group: cd_test
  - ${{ if eq(parameters.environment, 'Staging') }}:
      - group: cd_staging
  - ${{ if eq(parameters.environment, 'Training') }}:
      - group: cd_training
  - ${{ if eq(parameters.environment, 'Prod') }}:
      - group: cd_prod

pool:
  vmImage: ubuntu-latest

jobs:
  - job: InfraPlan
    displayName: Infrastructure Plan
    condition: eq('${{ parameters.terraformPlan }}', 'true')
    steps:
      - bash: |
          set -euo pipefail
          echo "Placeholder: Terraform plan would run for environment '${{ parameters.environment }}'."
          echo "Result: success (placeholder)."
        displayName: Placeholder infra plan

  - job: InfraApply
    displayName: Infrastructure Apply
    dependsOn: InfraPlan
    condition: and(succeeded(), eq('${{ parameters.terraformApply }}', 'true'), eq('${{ parameters.terraformPlan }}', 'true'))
    steps:
      - bash: |
          set -euo pipefail
          echo "Placeholder: Terraform apply would run for environment '${{ parameters.environment }}'."
          echo "Result: success (placeholder)."
        displayName: Placeholder infra apply

  - job: Deploy
    displayName: Application Deployment
    dependsOn:
      - InfraPlan
      - InfraApply
    condition: |
      and(
        in(dependencies.InfraPlan.result, 'Succeeded', 'Skipped'),
        in(dependencies.InfraApply.result, 'Succeeded', 'Skipped'),
        or(
          eq('${{ parameters.deployAppealsApi }}', 'true'),
          eq('${{ parameters.deployAppealsWeb }}', 'true'),
          eq('${{ parameters.deployAppealsPdf }}', 'true'),
          eq('${{ parameters.deployFunctions }}', 'true'),
          eq('${{ parameters.runDbMigration }}', 'true')
        )
      )
    steps:
      - bash: |
          set -euo pipefail
          echo "Placeholder: Deployment would run for '${{ parameters.environment }}'."
          echo "deployAppealsApi=${{ parameters.deployAppealsApi }}"
          echo "deployAppealsWeb=${{ parameters.deployAppealsWeb }}"
          echo "deployAppealsPdf=${{ parameters.deployAppealsPdf }}"
          echo "deployFunctions=${{ parameters.deployFunctions }}"
          echo "runDbMigration=${{ parameters.runDbMigration }}"
          echo "deployToSlot=${{ parameters.deployToSlot }}"
          echo "Result: success (placeholder)."
        displayName: Placeholder deployment

  - job: Seed
    displayName: Seed Data
    dependsOn: Deploy
    condition: and(in(dependencies.Deploy.result, 'Succeeded', 'Skipped'), eq('${{ parameters.seedData }}', 'true'))
    steps:
      - bash: |
          set -euo pipefail
          echo "Placeholder: Seed would run for '${{ parameters.environment }}'."
          echo "purgeAndRecreate=${{ parameters.purgeAndRecreate }}"
          echo "Result: success (placeholder)."
        displayName: Placeholder seed

  - job: LogDeployment
    displayName: Log deployment in Confluence
    dependsOn:
      - InfraPlan
      - InfraApply
      - Deploy
      - Seed
    condition: always()
    steps:
      - template: azure-pipelines-log-to-confluence.yml
        parameters:
          environment: ${{ parameters.environment }}
          terraformPlan: ${{ parameters.terraformPlan }}
          terraformApply: ${{ parameters.terraformApply }}
          deployAppealsApi: ${{ parameters.deployAppealsApi }}
          deployAppealsWeb: ${{ parameters.deployAppealsWeb }}
          deployAppealsPdf: ${{ parameters.deployAppealsPdf }}
          deployFunctions: ${{ parameters.deployFunctions }}
          runDbMigration: ${{ parameters.runDbMigration }}
          deployToSlot: ${{ parameters.deployToSlot }}
          seedData: ${{ parameters.seedData }}
          purgeAndRecreate: ${{ parameters.purgeAndRecreate }}
