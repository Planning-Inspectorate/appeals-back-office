# Full deployment wrapper (currently logging-only) that calls the shared
# Confluence logging template.

trigger: none
pr: none

parameters:
  - name: environment
    displayName: Environment
    type: string
    default: Dev
    values:
      - Dev
      - Test
      - Staging
      - Training
      - Prod

  - name: terraformPlan
    displayName: Terraform Plan
    type: boolean
    default: true
  - name: terraformApply
    displayName: Terraform Apply
    type: boolean
    default: false

  - name: deployAppealsApi
    displayName: Deploy Appeals API
    type: boolean
    default: true
  - name: deployAppealsWeb
    displayName: Deploy Appeals Web
    type: boolean
    default: true
  - name: deployAppealsPdf
    displayName: Deploy Appeals PDF
    type: boolean
    default: true
  - name: deployFunctions
    displayName: Deploy all four functions
    type: boolean
    default: true
  - name: runDbMigration
    displayName: Run DB migration
    type: boolean
    default: false
  - name: deployToSlot
    displayName: Deploy to slot
    type: boolean
    default: false

  - name: seedData
    displayName: Seed data
    type: boolean
    default: false
  - name: purgeAndRecreate
    displayName: Purge and recreate
    type: boolean
    default: false
  - name: failStage
    displayName: Force fail stage
    type: string
    default: None
    values:
      - None
      - TerraformPlan
      - TerraformApply
      - DeployAppealsAPI
      - DeployAppealsWeb
      - DeployAppealsPDF
      - DeployAppealsFunctions
      - RunDBMigration
      - SeedData

variables:
  - ${{ if eq(parameters.environment, 'Dev') }}:
      - group: cd_dev
  - ${{ if eq(parameters.environment, 'Test') }}:
      - group: cd_test
  - ${{ if eq(parameters.environment, 'Staging') }}:
      - group: cd_staging
  - ${{ if eq(parameters.environment, 'Training') }}:
      - group: cd_training
  - ${{ if eq(parameters.environment, 'Prod') }}:
      - group: cd_prod
  - name: FAIL_STAGE
    value: ${{ parameters.failStage }}

pool:
  vmImage: ubuntu-latest

stages:
  - stage: TerraformPlan
    displayName: Terraform Plan
    condition: succeeded()
    jobs:
      - job: TerraformPlan
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "TerraformPlan" ]]; then
                echo "Intentional failure: TerraformPlan selected in failStage."
                exit 1
              fi
            displayName: Validate terraform plan stage

          - bash: |
              set -euo pipefail
              if [[ "${{ parameters.terraformPlan }}" != "true" ]]; then
                echo "Terraform plan skipped (terraformPlan=false)."
                exit 0
              fi

              ENV_LOWER="$(echo '${{ parameters.environment }}' | tr '[:upper:]' '[:lower:]')"
              TFVARS_PATH="infrastructure/environments/${ENV_LOWER}.tfvars"

              if [[ ! -f "${TFVARS_PATH}" ]]; then
                echo "ERROR: tfvars file not found: ${TFVARS_PATH}"
                exit 1
              fi

              if ! command -v terraform >/dev/null 2>&1; then
                echo "ERROR: terraform is not installed on this agent."
                exit 1
              fi

              echo "Running terraform plan for ${ENV_LOWER} using ${TFVARS_PATH}"
              terraform -chdir=infrastructure init -input=false -reconfigure \
                -backend-config="storage_account_name=pinssttfstateuksappealbo" \
                -backend-config="resource_group_name=pins-rg-shared-terraform-uks" \
                -backend-config="container_name=terraform-state-appeals-back-office-${ENV_LOWER}" \
                -backend-config="key=terraform.tfstate"

              terraform -chdir=infrastructure plan -input=false -lock-timeout=5m \
                -var-file="environments/${ENV_LOWER}.tfvars" \
                -out="tfplan-${ENV_LOWER}"
            displayName: Run terraform plan

  - stage: TerraformApply
    displayName: Terraform Apply
    dependsOn: TerraformPlan
    condition: succeeded()
    jobs:
      - job: TerraformApply
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "TerraformApply" ]]; then
                echo "Intentional failure: TerraformApply selected in failStage."
                exit 1
              fi
              if [[ "${{ parameters.terraformApply }}" == "true" && "${{ parameters.terraformPlan }}" == "true" ]]; then
                echo "Terraform apply would run for environment '${{ parameters.environment }}'."
              elif [[ "${{ parameters.terraformApply }}" == "true" && "${{ parameters.terraformPlan }}" != "true" ]]; then
                echo "Terraform apply requested but terraformPlan=false, so apply is skipped."
              else
                echo "Terraform apply skipped (terraformApply=false)."
              fi
              echo "Result: success (placeholder)."
            displayName: Placeholder terraform apply

  - stage: DeployAppealsAPI
    displayName: Deploy Appeals API
    dependsOn: TerraformApply
    condition: succeeded()
    jobs:
      - job: DeployAppealsAPI
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "DeployAppealsAPI" ]]; then
                echo "Intentional failure: DeployAppealsAPI selected in failStage."
                exit 1
              fi
              if [[ "${{ parameters.deployAppealsApi }}" == "true" ]]; then
                echo "Deploy Appeals API would run for '${{ parameters.environment }}'."
              else
                echo "Deploy Appeals API skipped (deployAppealsApi=false)."
              fi
              echo "Result: success (placeholder)."
            displayName: Placeholder deploy API

  - stage: DeployAppealsWeb
    displayName: Deploy Appeals Web
    dependsOn: TerraformApply
    condition: succeeded()
    jobs:
      - job: DeployAppealsWeb
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "DeployAppealsWeb" ]]; then
                echo "Intentional failure: DeployAppealsWeb selected in failStage."
                exit 1
              fi
              if [[ "${{ parameters.deployAppealsWeb }}" == "true" ]]; then
                echo "Deploy Appeals Web would run for '${{ parameters.environment }}'."
              else
                echo "Deploy Appeals Web skipped (deployAppealsWeb=false)."
              fi
              echo "Result: success (placeholder)."
            displayName: Placeholder deploy web

  - stage: DeployAppealsPDF
    displayName: Deploy Appeals PDF
    dependsOn: TerraformApply
    condition: succeeded()
    jobs:
      - job: DeployAppealsPDF
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "DeployAppealsPDF" ]]; then
                echo "Intentional failure: DeployAppealsPDF selected in failStage."
                exit 1
              fi
              if [[ "${{ parameters.deployAppealsPdf }}" == "true" ]]; then
                echo "Deploy Appeals PDF would run for '${{ parameters.environment }}'."
              else
                echo "Deploy Appeals PDF skipped (deployAppealsPdf=false)."
              fi
              echo "Result: success (placeholder)."
            displayName: Placeholder deploy PDF

  - stage: DeployAppealsFunctions
    displayName: Deploy Appeals Functions
    dependsOn: TerraformApply
    condition: succeeded()
    jobs:
      - job: DeployAppealsFunctions
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "DeployAppealsFunctions" ]]; then
                echo "Intentional failure: DeployAppealsFunctions selected in failStage."
                exit 1
              fi
              if [[ "${{ parameters.deployFunctions }}" == "true" ]]; then
                echo "Deploy Appeals Functions would run for '${{ parameters.environment }}'."
              else
                echo "Deploy Appeals Functions skipped (deployFunctions=false)."
              fi
              echo "Result: success (placeholder)."
            displayName: Placeholder deploy functions

  - stage: RunDBMigration
    displayName: Run DB Migration
    dependsOn:
      - DeployAppealsAPI
      - DeployAppealsWeb
      - DeployAppealsPDF
      - DeployAppealsFunctions
    condition: succeeded()
    jobs:
      - job: RunDBMigration
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "RunDBMigration" ]]; then
                echo "Intentional failure: RunDBMigration selected in failStage."
                exit 1
              fi
              if [[ "${{ parameters.runDbMigration }}" == "true" ]]; then
                echo "DB migration would run for '${{ parameters.environment }}'."
              else
                echo "DB migration skipped (runDbMigration=false)."
              fi
              echo "Result: success (placeholder)."
            displayName: Placeholder DB migration

  - stage: SeedData
    displayName: Seed Data
    dependsOn: RunDBMigration
    condition: succeeded()
    jobs:
      - job: SeedData
        steps:
          - bash: |
              set -euo pipefail
              if [[ "${FAIL_STAGE}" == "SeedData" ]]; then
                echo "Intentional failure: SeedData selected in failStage."
                exit 1
              fi
              if [[ "${{ parameters.seedData }}" == "true" ]]; then
                echo "Seed data would run for '${{ parameters.environment }}'."
                echo "purgeAndRecreate=${{ parameters.purgeAndRecreate }}"
              else
                echo "Seed data skipped (seedData=false)."
              fi
              echo "Result: success (placeholder)."
            displayName: Placeholder seed data

  - stage: LogToConfluence
    displayName: Log To Confluence
    dependsOn: SeedData
    condition: always()
    jobs:
      - job: LogDeployment
        steps:
          - template: azure-pipelines-log-to-confluence.yml
            parameters:
              environment: ${{ parameters.environment }}
              terraformPlan: ${{ parameters.terraformPlan }}
              terraformApply: ${{ parameters.terraformApply }}
              deployAppealsApi: ${{ parameters.deployAppealsApi }}
              deployAppealsWeb: ${{ parameters.deployAppealsWeb }}
              deployAppealsPdf: ${{ parameters.deployAppealsPdf }}
              deployFunctions: ${{ parameters.deployFunctions }}
              runDbMigration: ${{ parameters.runDbMigration }}
              deployToSlot: ${{ parameters.deployToSlot }}
              seedData: ${{ parameters.seedData }}
              purgeAndRecreate: ${{ parameters.purgeAndRecreate }}
