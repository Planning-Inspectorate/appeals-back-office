trigger: none

pr:
  branches:
    include:
      - '*'
  paths:
    include:
      - infrastructure

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: refs/tags/release/3.24.2

extends:
  template: stages/wrapper_ci.yml@templates
  parameters:
    gitFetchDepth: 0
    globalVariables:
      - template: azure-pipelines-variables.yml@self
    validationJobs:
      - name: Check Commits
        steps:
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm ci
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm run commitlint
      - name: Run cypress e2e tests
        if: github.event.action == 'labeled' && github.event.label.name == 'e2eTests'
        steps:
          - task: ShellScript@2
            inputs:
                scriptPath: 'appeals/e2e/install-chromium.sh'
            displayName: 'Install Chromium'
            condition: eq(variables['agent.os'], 'Linux')
          - template: ../steps/node_script.yml
            parameters:
              nodeVersion: 22
              script: npm ci
          -   template: ../steps/node_script.yml
              parameters:
                  nodeVersion: 22
                  script: npm run api
          -   template: ../steps/node_script.yml
              parameters:
                  nodeVersion: 22
                  script: npm run web
          -   template: ../steps/node_script.yml
              parameters:
                  nodeVersion: 22
                  script: npm run api
          -   template: ../steps/node_script.yml
              parameters:
                  nodeVersion: 22
                  script: npm run e2e

